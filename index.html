<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solitaire</title>
<style>
  :root {
    --bg: #0f1417;
    --felt: #155c49;
    --felt-deep: #0b3f34;
    --rail: #23272b;
    --rail-2: #30353a;
    --line: #58615e;
    --line-soft: rgba(255, 255, 255, 0.2);
    --paper: #fbf7ec;
    --paper-edge: #ded4c0;
    --ink: #25282b;
    --red: #b02f31;
    --gold: #d9a441;
    --mint: #78d6b0;
    --warn: #f07c58;
    --card-w: clamp(38px, 10.6vw, 82px);
    --card-h: calc(var(--card-w) * 1.42);
    --gap: clamp(4px, 1.2vw, 12px);
    --fan-gap: clamp(19px, 3.8vw, 34px);
    --radius: 8px;
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html,
  body {
    min-height: 100%;
    margin: 0;
  }

  body {
    color: #eef3ef;
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent 28%),
      radial-gradient(circle at top, #2a3135 0, var(--bg) 52%);
    padding: clamp(10px, 2.6vw, 24px);
    user-select: none;
  }

  button {
    font: inherit;
  }

  .app {
    width: min(100%, calc(var(--card-w) * 7 + var(--gap) * 8 + 2px));
    margin: 0 auto;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 8px;
    min-width: 0;
  }

  h1 {
    margin: 0;
    font-size: clamp(21px, 4vw, 34px);
    font-weight: 800;
    letter-spacing: 0;
    line-height: 1;
  }

  .variant {
    color: #aeb9b3;
    font-size: 13px;
    white-space: nowrap;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .icon-btn {
    width: 38px;
    height: 36px;
    display: grid;
    place-items: center;
    border: 1px solid #555e5b;
    border-radius: var(--radius);
    color: #f6f0df;
    background: #252a2d;
    cursor: pointer;
    line-height: 1;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
  }

  .icon-btn:hover {
    border-color: var(--gold);
  }

  .icon-btn:disabled {
    color: #7a817d;
    border-color: #414846;
    cursor: default;
  }

  .scorebar {
    display: grid;
    grid-template-columns: auto auto auto 1fr;
    gap: 8px;
    align-items: center;
    margin-bottom: 12px;
  }

  .stat,
  .message {
    min-height: 31px;
    display: flex;
    align-items: center;
    border: 1px solid #48514e;
    border-radius: var(--radius);
    background: rgba(24, 29, 31, 0.82);
    color: #dfe8e1;
    font-size: 13px;
    padding: 5px 9px;
  }

  .stat {
    min-width: 76px;
    justify-content: center;
    font-variant-numeric: tabular-nums;
  }

  .message {
    min-width: 0;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    color: #bfcac4;
  }

  .board {
    min-height: calc(var(--card-h) + var(--fan-gap) * 11 + 110px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 12px;
    background:
      linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
      linear-gradient(180deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
      linear-gradient(145deg, var(--felt), var(--felt-deep));
    background-size: 28px 28px, 28px 28px, auto;
    padding: var(--gap);
    box-shadow: 0 18px 60px rgba(0, 0, 0, 0.36);
    touch-action: none;
  }

  .top-row,
  .tableau {
    display: grid;
    grid-template-columns: repeat(7, var(--card-w));
    gap: var(--gap);
  }

  .top-row {
    margin-bottom: calc(var(--gap) * 2.2);
  }

  .tableau {
    align-items: start;
  }

  .pile,
  .slot {
    width: var(--card-w);
    min-height: var(--card-h);
    position: relative;
  }

  .slot {
    border: 1px dashed rgba(255, 255, 255, 0.34);
    border-radius: var(--radius);
    background: rgba(5, 22, 18, 0.18);
  }

  .stock {
    cursor: pointer;
  }

  .waste {
    grid-column: 2;
  }

  #foundation-0 {
    grid-column: 4;
  }

  .placeholder {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    color: rgba(255, 255, 255, 0.34);
    font-size: clamp(20px, 5vw, 33px);
    pointer-events: none;
  }

  .placeholder.red {
    color: rgba(255, 180, 174, 0.5);
  }

  .tableau-pile {
    border: 1px solid rgba(255, 255, 255, 0.13);
    border-radius: var(--radius);
    background: rgba(0, 0, 0, 0.08);
  }

  .playing-card {
    width: var(--card-w);
    height: var(--card-h);
    position: absolute;
    left: 0;
    top: 0;
    border: 1px solid var(--paper-edge);
    border-radius: var(--radius);
    background: var(--paper);
    color: var(--ink);
    cursor: grab;
    padding: 0;
    box-shadow:
      0 8px 18px rgba(0, 0, 0, 0.24),
      inset 0 0 0 1px rgba(255, 255, 255, 0.5);
    overflow: hidden;
  }

  .playing-card:active {
    cursor: grabbing;
  }

  .playing-card.red {
    color: var(--red);
  }

  .playing-card.face-down {
    cursor: default;
    border-color: #152e44;
    background:
      linear-gradient(135deg, transparent 22%, rgba(255, 255, 255, 0.18) 22% 28%, transparent 28% 72%, rgba(255, 255, 255, 0.13) 72% 78%, transparent 78%),
      linear-gradient(45deg, #1c4d72, #183a5c);
  }

  .playing-card.face-down::after {
    content: "";
    position: absolute;
    inset: 10%;
    border: 1px solid rgba(255, 255, 255, 0.38);
    border-radius: 6px;
  }

  .playing-card.selected {
    outline: 3px solid var(--gold);
    outline-offset: 2px;
  }

  .playing-card.is-drag-source {
    opacity: 0.2;
  }

  .corner {
    position: absolute;
    display: grid;
    justify-items: center;
    min-width: 18px;
    font-weight: 800;
    line-height: 0.92;
    font-size: clamp(11px, 2.45vw, 17px);
  }

  .corner.top {
    top: 6%;
    left: 8%;
  }

  .corner.bottom {
    right: 8%;
    bottom: 6%;
    transform: rotate(180deg);
  }

  .corner .suit {
    font-size: 0.82em;
  }

  .pip {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    font-size: clamp(23px, 6.6vw, 47px);
    line-height: 1;
  }

  .drop-ok {
    border-color: var(--mint);
    box-shadow: 0 0 0 2px rgba(120, 214, 176, 0.34);
  }

  .drop-bad {
    border-color: var(--warn);
    box-shadow: 0 0 0 2px rgba(240, 124, 88, 0.28);
  }

  .drag-stack {
    position: fixed;
    z-index: 1000;
    width: var(--card-w);
    pointer-events: none;
    filter: drop-shadow(0 18px 22px rgba(0, 0, 0, 0.35));
  }

  .drag-stack .playing-card {
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
  }

  .win {
    position: fixed;
    inset: 0;
    display: none;
    place-items: center;
    padding: 20px;
    background: rgba(7, 11, 12, 0.62);
    z-index: 1500;
  }

  .win.show {
    display: grid;
  }

  .win-panel {
    width: min(360px, 100%);
    border: 1px solid rgba(255, 255, 255, 0.24);
    border-radius: 12px;
    background: #1c2224;
    color: #f2f7f3;
    padding: 22px;
    text-align: center;
    box-shadow: 0 20px 70px rgba(0, 0, 0, 0.46);
  }

  .win-panel h2 {
    margin: 0 0 6px;
    font-size: 26px;
    letter-spacing: 0;
  }

  .win-panel p {
    margin: 0 0 16px;
    color: #bfcbc5;
  }

  .primary-btn {
    min-height: 40px;
    border: 1px solid #f0c464;
    border-radius: var(--radius);
    background: var(--gold);
    color: #251c0c;
    font-weight: 800;
    padding: 8px 14px;
    cursor: pointer;
  }

  @media (max-width: 460px) {
    body {
      padding: 8px;
    }

    .topbar {
      align-items: flex-start;
    }

    .brand {
      flex-direction: column;
      gap: 2px;
    }

    .scorebar {
      grid-template-columns: repeat(3, 1fr);
    }

    .message {
      grid-column: 1 / -1;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
    }
  }
</style>
</head>
<body>
<main class="app">
  <header class="topbar">
    <div class="brand">
      <h1>Solitaire</h1>
      <span class="variant">Klondike</span>
    </div>
    <div class="toolbar" aria-label="ゲーム操作">
      <button class="icon-btn" id="newGame" type="button" title="新しいゲーム" aria-label="新しいゲーム">↻</button>
      <button class="icon-btn" id="undo" type="button" title="元に戻す" aria-label="元に戻す">↶</button>
      <button class="icon-btn" id="autoMove" type="button" title="組札へ送る" aria-label="組札へ送る">⇧</button>
    </div>
  </header>

  <section class="scorebar" aria-label="ゲーム情報">
    <div class="stat" id="moves">0手</div>
    <div class="stat" id="timer">00:00</div>
    <div class="stat" id="stockCount">山札 24</div>
    <div class="message" id="message">Aから順に組札へ集めます</div>
  </section>

  <section class="board" id="board" aria-label="ソリティア盤面">
    <div class="top-row">
      <div class="slot stock pile" id="stock" data-pile-type="stock" data-pile-index="0" role="button" aria-label="山札"></div>
      <div class="slot waste pile" id="waste" data-pile-type="waste" data-pile-index="0" aria-label="捨て札"></div>
      <div class="slot foundation pile" id="foundation-0" data-pile-type="foundation" data-pile-index="0" aria-label="スペードの組札"></div>
      <div class="slot foundation pile" id="foundation-1" data-pile-type="foundation" data-pile-index="1" aria-label="ハートの組札"></div>
      <div class="slot foundation pile" id="foundation-2" data-pile-type="foundation" data-pile-index="2" aria-label="ダイヤの組札"></div>
      <div class="slot foundation pile" id="foundation-3" data-pile-type="foundation" data-pile-index="3" aria-label="クラブの組札"></div>
    </div>
    <div class="tableau" id="tableau" aria-label="場札"></div>
  </section>
</main>

<div class="win" id="win" role="dialog" aria-modal="true" aria-labelledby="winTitle">
  <div class="win-panel">
    <h2 id="winTitle">クリア</h2>
    <p id="winStats">0手 / 00:00</p>
    <button class="primary-btn" id="playAgain" type="button">もう一度</button>
  </div>
</div>

<script>
(() => {
  "use strict";

  const suits = [
    { id: "spades", label: "スペード", symbol: "♠", color: "black" },
    { id: "hearts", label: "ハート", symbol: "♥", color: "red" },
    { id: "diamonds", label: "ダイヤ", symbol: "♦", color: "red" },
    { id: "clubs", label: "クラブ", symbol: "♣", color: "black" }
  ];

  const ranks = [
    { label: "A", value: 1 },
    { label: "2", value: 2 },
    { label: "3", value: 3 },
    { label: "4", value: 4 },
    { label: "5", value: 5 },
    { label: "6", value: 6 },
    { label: "7", value: 7 },
    { label: "8", value: 8 },
    { label: "9", value: 9 },
    { label: "10", value: 10 },
    { label: "J", value: 11 },
    { label: "Q", value: 12 },
    { label: "K", value: 13 }
  ];

  const state = {
    stock: [],
    waste: [],
    foundations: [[], [], [], []],
    tableau: [[], [], [], [], [], [], []],
    moves: 0,
    history: [],
    selected: null,
    startedAt: Date.now(),
    won: false
  };

  const board = document.getElementById("board");
  const tableauEl = document.getElementById("tableau");
  const stockEl = document.getElementById("stock");
  const wasteEl = document.getElementById("waste");
  const foundationEls = [...document.querySelectorAll(".foundation")];
  const movesEl = document.getElementById("moves");
  const timerEl = document.getElementById("timer");
  const stockCountEl = document.getElementById("stockCount");
  const messageEl = document.getElementById("message");
  const undoBtn = document.getElementById("undo");
  const winEl = document.getElementById("win");
  const winStatsEl = document.getElementById("winStats");

  let pointer = null;
  let dragLayer = null;
  let currentDrop = null;
  let suppressNextClick = false;

  document.getElementById("newGame").addEventListener("click", newGame);
  document.getElementById("playAgain").addEventListener("click", newGame);
  undoBtn.addEventListener("click", undo);
  document.getElementById("autoMove").addEventListener("click", autoMoveAvailable);
  board.addEventListener("click", onBoardClick);
  board.addEventListener("dblclick", onBoardDoubleClick);
  board.addEventListener("pointerdown", onPointerDown);
  window.addEventListener("pointermove", onPointerMove);
  window.addEventListener("pointerup", onPointerUp);
  window.addEventListener("pointercancel", cancelDrag);
  window.addEventListener("resize", () => {
    render();
  });

  setInterval(() => {
    timerEl.textContent = formatTime(elapsedSeconds());
  }, 1000);

  function newGame() {
    const deck = createDeck();
    shuffle(deck);

    state.stock = [];
    state.waste = [];
    state.foundations = [[], [], [], []];
    state.tableau = [[], [], [], [], [], [], []];
    state.history = [];
    state.selected = null;
    state.moves = 0;
    state.startedAt = Date.now();
    state.won = false;
    winEl.classList.remove("show");

    for (let col = 0; col < 7; col += 1) {
      for (let row = 0; row <= col; row += 1) {
        const card = deck.pop();
        card.faceUp = row === col;
        state.tableau[col].push(card);
      }
    }

    state.stock = deck.map((card) => ({ ...card, faceUp: false }));
    setMessage("新しいゲーム");
    render();
  }

  function createDeck() {
    const deck = [];
    suits.forEach((suit, suitIndex) => {
      ranks.forEach((rank) => {
        deck.push({
          id: `${suit.id}-${rank.value}`,
          suit: suit.id,
          suitIndex,
          suitLabel: suit.label,
          symbol: suit.symbol,
          color: suit.color,
          rank: rank.label,
          value: rank.value,
          faceUp: false
        });
      });
    });
    return deck;
  }

  function shuffle(deck) {
    for (let i = deck.length - 1; i > 0; i -= 1) {
      const j = Math.floor(Math.random() * (i + 1));
      [deck[i], deck[j]] = [deck[j], deck[i]];
    }
  }

  function render() {
    clearPiles();
    renderStock();
    renderWaste();
    renderFoundations();
    renderTableau();
    movesEl.textContent = `${state.moves}手`;
    timerEl.textContent = formatTime(elapsedSeconds());
    stockCountEl.textContent = `山札 ${state.stock.length}`;
    undoBtn.disabled = state.history.length === 0;
  }

  function clearPiles() {
    [stockEl, wasteEl, ...foundationEls].forEach((pile) => {
      pile.replaceChildren();
      pile.classList.remove("drop-ok", "drop-bad");
    });
    tableauEl.replaceChildren();
  }

  function renderStock() {
    if (state.stock.length > 0) {
      stockEl.appendChild(createBackCard("山札"));
      return;
    }

    const symbol = state.waste.length > 0 ? "↺" : "×";
    stockEl.appendChild(createPlaceholder(symbol, false));
  }

  function renderWaste() {
    const card = topCard(state.waste);
    if (card) {
      wasteEl.appendChild(createCard(card, 0));
      return;
    }
    wasteEl.appendChild(createPlaceholder("□", false));
  }

  function renderFoundations() {
    foundationEls.forEach((pile, index) => {
      const card = topCard(state.foundations[index]);
      if (card) {
        pile.appendChild(createCard(card, 0));
      } else {
        pile.appendChild(createPlaceholder(suits[index].symbol, suits[index].color === "red"));
      }
    });
  }

  function renderTableau() {
    state.tableau.forEach((pileCards, index) => {
      const pileEl = document.createElement("div");
      pileEl.className = "pile tableau-pile";
      pileEl.dataset.pileType = "tableau";
      pileEl.dataset.pileIndex = String(index);
      pileEl.ariaLabel = `場札 ${index + 1}`;
      const height = `calc(var(--card-h) + var(--fan-gap) * ${Math.max(0, pileCards.length - 1)})`;
      pileEl.style.minHeight = height;

      if (pileCards.length === 0) {
        pileEl.appendChild(createPlaceholder("K", false));
      }

      pileCards.forEach((card, row) => {
        pileEl.appendChild(card.faceUp ? createCard(card, row) : createBackCard("裏向きのカード", row));
      });
      tableauEl.appendChild(pileEl);
    });
  }

  function createCard(card, row) {
    const el = document.createElement("button");
    el.className = `playing-card ${card.color === "red" ? "red" : "black"}`;
    if (state.selected && state.selected.cardId === card.id) {
      el.classList.add("selected");
    }
    el.type = "button";
    el.dataset.cardId = card.id;
    el.style.top = `calc(var(--fan-gap) * ${row})`;
    el.style.zIndex = String(row + 1);
    el.ariaLabel = `${card.suitLabel}の${card.rank}`;
    el.innerHTML = `
      <span class="corner top"><span>${card.rank}</span><span class="suit">${card.symbol}</span></span>
      <span class="pip">${card.symbol}</span>
      <span class="corner bottom"><span>${card.rank}</span><span class="suit">${card.symbol}</span></span>
    `;
    return el;
  }

  function createBackCard(label, row = 0) {
    const el = document.createElement("button");
    el.className = "playing-card face-down";
    el.type = "button";
    el.tabIndex = -1;
    el.setAttribute("aria-disabled", "true");
    el.style.top = `calc(var(--fan-gap) * ${row})`;
    el.style.zIndex = String(row + 1);
    el.ariaLabel = label;
    return el;
  }

  function createPlaceholder(text, red) {
    const el = document.createElement("div");
    el.className = `placeholder${red ? " red" : ""}`;
    el.textContent = text;
    return el;
  }

  function onBoardClick(event) {
    if (suppressNextClick) {
      suppressNextClick = false;
      return;
    }

    const pileEl = event.target.closest(".pile");
    const cardEl = event.target.closest("[data-card-id]");

    if (cardEl) {
      handleCardTap(cardEl.dataset.cardId);
      return;
    }

    if (!pileEl) {
      clearSelection();
      return;
    }

    const target = pileFromElement(pileEl);

    if (target.type === "stock") {
      drawStock();
      return;
    }

    if (state.selected) {
      trySelectedMove(target);
      return;
    }

    clearSelection();
  }

  function onBoardDoubleClick(event) {
    const cardEl = event.target.closest("[data-card-id]");
    if (!cardEl) {
      return;
    }
    const descriptor = getMoveDescriptor(cardEl.dataset.cardId);
    if (descriptor && descriptor.cards.length === 1) {
      moveToFoundation(descriptor);
    }
  }

  function onPointerDown(event) {
    if (event.button !== 0) {
      return;
    }

    const cardEl = event.target.closest("[data-card-id]");
    if (!cardEl) {
      return;
    }

    const descriptor = getMoveDescriptor(cardEl.dataset.cardId);
    if (!descriptor) {
      return;
    }

    const rect = cardEl.getBoundingClientRect();
    pointer = {
      cardId: cardEl.dataset.cardId,
      descriptor,
      startX: event.clientX,
      startY: event.clientY,
      offsetX: event.clientX - rect.left,
      offsetY: event.clientY - rect.top,
      dragging: false,
      suppressClick: true
    };
    event.preventDefault();
  }

  function onPointerMove(event) {
    if (!pointer) {
      return;
    }

    const distance = Math.hypot(event.clientX - pointer.startX, event.clientY - pointer.startY);
    if (!pointer.dragging && distance > 7) {
      startDrag();
    }

    if (!pointer.dragging) {
      return;
    }

    moveDragLayer(event.clientX, event.clientY);
    updateDropTarget(event.clientY, event.clientY);
  }

  function onPointerUp(event) {
    if (!pointer) {
      return;
    }

    if (!pointer.dragging) {
      const cardId = pointer.cardId;
      pointer = null;
      suppressNextClick = true;
      handleCardTap(cardId);
      return;
    }

    const drop = getDropTarget(event.clientX, event.clientY);
    const descriptor = pointer.descriptor;
    cleanupDrag();

    if (drop && tryMove(descriptor, drop)) {
      return;
    }

    setMessage("そこには置けません");
    render();
  }

  function startDrag() {
    pointer.dragging = true;
    clearSelection(false);
    dragLayer = document.createElement("div");
    dragLayer.className = "drag-stack";
    dragLayer.style.height = `calc(var(--card-h) + var(--fan-gap) * ${Math.max(0, pointer.descriptor.cards.length - 1)})`;

    pointer.descriptor.cards.forEach((card, index) => {
      const clone = createCard(card, index);
      clone.classList.remove("selected");
      clone.tabIndex = -1;
      dragLayer.appendChild(clone);
      const sourceEl = document.querySelector(`[data-card-id="${card.id}"]`);
      if (sourceEl) {
        sourceEl.classList.add("is-drag-source");
      }
    });

    document.body.appendChild(dragLayer);
    moveDragLayer(pointer.startX, pointer.startY);
  }

  function moveDragLayer(x, y) {
    if (!dragLayer || !pointer) {
      return;
    }
    dragLayer.style.transform = `translate(${x - pointer.offsetX}px, ${y - pointer.offsetY}px)`;
  }

  function updateDropTarget(x, y) {
    clearDropHighlight();
    const drop = getDropTarget(x, y);
    if (!drop) {
      return;
    }

    const pileEl = pileElement(drop);
    if (!pileEl) {
      return;
    }
    const ok = canMove(pointer.descriptor, drop);
    pileEl.classList.add(ok ? "drop-ok" : "drop-bad");
    currentDrop = pileEl;
  }

  function getDropTarget(x, y) {
    const element = document.elementFromPoint(x, y);
    const pileEl = element ? element.closest(".pile") : null;
    if (!pileEl) {
      return null;
    }

    const pile = pileFromElement(pileEl);
    if (pile.type === "foundation" || pile.type === "tableau") {
      return pile;
    }
    return null;
  }

  function cleanupDrag() {
    clearDropHighlight();
    document.querySelectorAll(".is-drag-source").forEach((el) => {
      el.classList.remove("is-drag-source");
    });
    if (dragLayer) {
      dragLayer.remove();
      dragLayer = null;
    }
    pointer = null;
    suppressNextClick = true;
  }

  function cancelDrag() {
    if (!pointer) {
      return;
    }
    cleanupDrag();
    render();
  }

  function clearDropHighlight() {
    if (currentDrop) {
      currentDrop.classList.remove("drop-ok", "drop-bad");
      currentDrop = null;
    }
  }

  function handleCardTap(cardId) {
    const descriptor = getMoveDescriptor(cardId);
    if (!descriptor) {
      setMessage("そのカードはまだ動かせません");
      clearSelection();
      return;
    }

    if (state.selected) {
      if (state.selected.cardId === cardId) {
        if (descriptor.cards.length === 1 && moveToFoundation(descriptor)) {
          return;
        }
        clearSelection();
        setMessage("選択を解除しました");
        return;
      }

      const clickedPile = findCardLocation(cardId);
      if (clickedPile && (clickedPile.type === "tableau" || clickedPile.type === "foundation")) {
        const target = { type: clickedPile.type, index: clickedPile.index };
        if (trySelectedMove(target)) {
          return;
        }
      }
    }

    selectDescriptor(descriptor);
  }

  function selectDescriptor(descriptor) {
    state.selected = {
      cardId: descriptor.cards[0].id,
      source: descriptor.source,
      cards: descriptor.cards.map((card) => card.id)
    };
    const label = descriptor.cards.length === 1 ? cardName(descriptor.cards[0]) : `${cardName(descriptor.cards[0])}から${descriptor.cards.length}枚`;
    setMessage(`${label}を選択中`);
    render();
  }

  function clearSelection(shouldRender = true) {
    state.selected = null;
    if (shouldRender) {
      render();
    }
  }

  function trySelectedMove(target) {
    const descriptor = descriptorFromSelection();
    if (!descriptor) {
      clearSelection();
      return false;
    }
    return tryMove(descriptor, target);
  }

  function tryMove(descriptor, target) {
    if (!canMove(descriptor, target)) {
      setMessage("そこには置けません");
      clearSelection();
      return false;
    }

    saveHistory();
    removeFromSource(descriptor.source, descriptor.cards.length);
    addToTarget(target, descriptor.cards);
    flipOpenTop(descriptor.source);
    state.moves += 1;
    state.selected = null;
    setMessage("移動しました");
    render();
    checkWin();
    return true;
  }

  function canMove(descriptor, target) {
    if (!descriptor || !target) {
      return false;
    }

    const source = descriptor.source;
    if (source.type === target.type && source.index === target.index) {
      return false;
    }

    const moving = descriptor.cards[0];

    if (target.type === "foundation") {
      if (descriptor.cards.length !== 1 || moving.suitIndex !== target.index) {
        return false;
      }
      const pile = state.foundations[target.index];
      const top = topCard(pile);
      return top ? top.suit === moving.suit && moving.value === top.value + 1 : moving.value === 1;
    }

    if (target.type === "tableau") {
      if (!validSequence(descriptor.cards)) {
        return false;
      }
      const pile = state.tableau[target.index];
      const top = topCard(pile);
      if (!top) {
        return moving.value === 13;
      }
      return top.faceUp && top.color !== moving.color && top.value === moving.value + 1;
    }

    return false;
  }

  function removeFromSource(source, count) {
    if (source.type === "waste") {
      state.waste.splice(state.waste.length - count, count);
      return;
    }
    if (source.type === "foundation") {
      state.foundations[source.index].splice(state.foundations[source.index].length - count, count);
      return;
    }
    if (source.type === "tableau") {
      state.tableau[source.index].splice(state.tableau[source.index].length - count, count);
    }
  }

  function addToTarget(target, cards) {
    const cardsToAdd = cards.map((card) => ({ ...card, faceUp: true }));
    if (target.type === "foundation") {
      state.foundations[target.index].push(...cardsToAdd);
      return;
    }
    if (target.type === "tableau") {
      state.tableau[target.index].push(...cardsToAdd);
    }
  }

  function flipOpenTop(source) {
    if (source.type !== "tableau") {
      return;
    }
    const pile = state.tableau[source.index];
    const top = topCard(pile);
    if (top && !top.faceUp) {
      top.faceUp = true;
    }
  }

  function drawStock() {
    if (state.stock.length > 0) {
      saveHistory();
      const card = state.stock.pop();
      card.faceUp = true;
      state.waste.push(card);
      state.moves += 1;
      state.selected = null;
      setMessage(`${cardName(card)}をめくりました`);
      render();
      return;
    }

    if (state.waste.length > 0) {
      saveHistory();
      while (state.waste.length > 0) {
        const card = state.waste.pop();
        card.faceUp = false;
        state.stock.push(card);
      }
      state.moves += 1;
      state.selected = null;
      setMessage("捨て札を山札へ戻しました");
      render();
      return;
    }

    setMessage("山札は空です");
  }

  function autoMoveAvailable() {
    const candidates = [];

    const waste = topCard(state.waste);
    if (waste) {
      candidates.push({ source: { type: "waste", index: 0 }, cards: [waste] });
    }

    state.tableau.forEach((pile, index) => {
      const top = topCard(pile);
      if (top && top.faceUp) {
        candidates.push({ source: { type: "tableau", index }, cards: [top] });
      }
    });

    const moved = candidates.some((descriptor) => moveToFoundation(descriptor));
    if (!moved) {
      setMessage("組札へ送れるカードがありません");
    }
  }

  function moveToFoundation(descriptor) {
    if (!descriptor || descriptor.cards.length !== 1) {
      return false;
    }
    const target = { type: "foundation", index: descriptor.cards[0].suitIndex };
    return tryMove(descriptor, target);
  }

  function getMoveDescriptor(cardId) {
    const waste = topCard(state.waste);
    if (waste && waste.id === cardId) {
      return { source: { type: "waste", index: 0 }, cards: [waste] };
    }

    for (let index = 0; index < state.foundations.length; index += 1) {
      const card = topCard(state.foundations[index]);
      if (card && card.id === cardId) {
        return { source: { type: "foundation", index }, cards: [card] };
      }
    }

    for (let index = 0; index < state.tableau.length; index += 1) {
      const pile = state.tableau[index];
      const cardIndex = pile.findIndex((card) => card.id === cardId);
      if (cardIndex === -1) {
        continue;
      }
      const card = pile[cardIndex];
      if (!card.faceUp) {
        return null;
      }
      const cards = pile.slice(cardIndex);
      if (!validSequence(cards)) {
        return null;
      }
      return { source: { type: "tableau", index }, cards };
    }

    return null;
  }

  function descriptorFromSelection() {
    if (!state.selected) {
      return null;
    }

    const descriptor = getMoveDescriptor(state.selected.cardId);
    if (!descriptor) {
      return null;
    }

    const sameCards = descriptor.cards.map((card) => card.id).join(",") === state.selected.cards.join(",");
    return sameCards ? descriptor : null;
  }

  function findCardLocation(cardId) {
    for (let index = 0; index < state.tableau.length; index += 1) {
      if (state.tableau[index].some((card) => card.id === cardId)) {
        return { type: "tableau", index };
      }
    }
    for (let index = 0; index < state.foundations.length; index += 1) {
      if (state.foundations[index].some((card) => card.id === cardId)) {
        return { type: "foundation", index };
      }
    }
    if (state.waste.some((card) => card.id === cardId)) {
      return { type: "waste", index: 0 };
    }
    return null;
  }

  function validSequence(cards) {
    for (let index = 0; index < cards.length; index += 1) {
      if (!cards[index].faceUp) {
        return false;
      }
      if (index === 0) {
        continue;
      }
      const prev = cards[index - 1];
      const card = cards[index];
      if (prev.color === card.color || prev.value !== card.value + 1) {
        return false;
      }
    }
    return true;
  }

  function pileFromElement(element) {
    return {
      type: element.dataset.pileType,
      index: Number(element.dataset.pileIndex || 0)
    };
  }

  function pileElement(pile) {
    if (pile.type === "foundation") {
      return foundationEls[pile.index];
    }
    if (pile.type === "tableau") {
      return tableauEl.children[pile.index];
    }
    if (pile.type === "waste") {
      return wasteEl;
    }
    return stockEl;
  }

  function saveHistory() {
    state.history.push(snapshot());
    if (state.history.length > 120) {
      state.history.shift();
    }
  }

  function snapshot() {
    return JSON.stringify({
      stock: state.stock,
      waste: state.waste,
      foundations: state.foundations,
      tableau: state.tableau,
      moves: state.moves,
      startedAt: state.startedAt,
      won: state.won
    });
  }

  function undo() {
    const previous = state.history.pop();
    if (!previous) {
      return;
    }
    const data = JSON.parse(previous);
    state.stock = data.stock;
    state.waste = data.waste;
    state.foundations = data.foundations;
    state.tableau = data.tableau;
    state.moves = data.moves;
    state.startedAt = data.startedAt;
    state.won = data.won;
    state.selected = null;
    winEl.classList.remove("show");
    setMessage("元に戻しました");
    render();
  }

  function checkWin() {
    const total = state.foundations.reduce((sum, pile) => sum + pile.length, 0);
    if (total !== 52 || state.won) {
      return;
    }
    state.won = true;
    winStatsEl.textContent = `${state.moves}手 / ${formatTime(elapsedSeconds())}`;
    winEl.classList.add("show");
  }

  function topCard(pile) {
    return pile[pile.length - 1] || null;
  }

  function cardName(card) {
    return `${card.suitLabel}${card.rank}`;
  }

  function setMessage(text) {
    messageEl.textContent = text;
  }

  function elapsedSeconds() {
    return Math.max(0, Math.floor((Date.now() - state.startedAt) / 1000));
  }

  function formatTime(totalSeconds) {
    const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
    const seconds = String(totalSeconds % 60).padStart(2, "0");
    return `${minutes}:${seconds}`;
  }

  newGame();
})();
</script>
</body>
</html>
